name: new_drawer
description: "Photo Organizer App - helps users manually organize local photos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7
  photo_view: ^0.15.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true